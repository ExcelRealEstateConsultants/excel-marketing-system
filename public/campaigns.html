<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Campaign Builder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .app-tab {
      background: #e9ecef !important;
      color: #333 !important;
      border: none;
      padding: 10px 22px;
      border-radius: 8px 8px 0 0;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .app-tab.active-tab {
      background: #00a143 !important;
      color: #ffffff !important;
    }
  </style>
</head>

<body class="bg-light">

<div class="container mt-5">

  <h2>Email Campaign Builder</h2>

  <!-- Tabs -->
  <div class="mb-4">
    <a href="/campaigns.html" id="campaignsTab" class="app-tab">Campaigns</a>
    <a href="/contacts.html" id="contactsTab" class="app-tab">Contacts</a>
  </div>

  <!-- Campaign Type -->
  <div class="mb-3">
    <label>Campaign Type</label>
    <select id="campaignType" class="form-control">
      <option value="email">Email</option>
      <option value="sms">SMS (coming soon)</option>
    </select>
  </div>

  <!-- Recipients -->
  <div class="mb-3">
    <label>Recipients (comma-separated emails)</label>
    <textarea id="recipients" class="form-control" rows="3"
      placeholder="email1@gmail.com, email2@gmail.com, email3@gmail.com"></textarea>
  </div>

  <!-- Subject -->
  <div class="mb-3">
    <label>Subject Line</label>
    <input id="subject" class="form-control" placeholder="Subject">
  </div>

  <!-- Content -->
  <div class="mb-3">
    <label>Email Content</label>
    <textarea id="emailContent" class="form-control" rows="8"></textarea>
  </div>

  <!-- Send Campaign -->
  <button class="btn btn-primary" onclick="sendCampaign()">
    Send Campaign
  </button>

</div>

<script>
function setActiveTab() {
  const path = window.location.pathname.toLowerCase();

  document.getElementById('campaignsTab').classList.remove('active-tab');
  document.getElementById('contactsTab').classList.remove('active-tab');

  if (path.includes('contacts')) {
    document.getElementById('contactsTab').classList.add('active-tab');
  } else {
    document.getElementById('campaignsTab').classList.add('active-tab');
  }
}

async function sendCampaign() {

  const recipientsRaw = document.getElementById('recipients').value;

  const payload = {
    campaignType: document.getElementById('campaignType').value,
    recipients: recipientsRaw
      .split(',')
      .map(email => email.trim())
      .filter(email => email.length > 0),
    subject: document.getElementById('subject').value,
    content: document.getElementById('emailContent').value
  };

  const res = await fetch('/api/send-campaign', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  const data = await res.json();
  alert(data.message);
}

setActiveTab();
</script>

</body>
</html>
