<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contacts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .app-tab {
      background: #e9ecef !important;
      color: #333 !important;
      border: none;
      padding: 10px 22px;
      border-radius: 8px 8px 0 0;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .app-tab.active-tab {
      background: #00a143 !important;
      color: #ffffff !important;
    }
  </style>
</head>

<body class="bg-light">

<div class="container mt-5">

  <h2>Contacts</h2>

  <!-- Tabs -->
  <div class="mb-4">
    <a href="/campaigns.html" id="campaignsTab" class="app-tab">Campaigns</a>
    <a href="/contacts.html" id="contactsTab" class="app-tab">Contacts</a>
  </div>

  <!-- Add Contact -->
  <div class="card p-3 mb-4">
    <h5>Add New Contact</h5>

    <input id="name" class="form-control mb-2" placeholder="Name">
    <input id="email" class="form-control mb-2" placeholder="Email">
    <input id="phone" class="form-control mb-2" placeholder="Phone">

    <button class="btn btn-primary" onclick="addContact()">Add Contact</button>
  </div>

  <!-- Contact List -->
  <div class="card p-3">
    <h5>All Contacts</h5>
    <div id="contactsList"></div>
  </div>

</div>

<script>
function setActiveTab() {
  const path = window.location.pathname.toLowerCase();

  document.getElementById('campaignsTab').classList.remove('active-tab');
  document.getElementById('contactsTab').classList.remove('active-tab');

  if (path.includes('contacts')) {
    document.getElementById('contactsTab').classList.add('active-tab');
  } else {
    document.getElementById('campaignsTab').classList.add('active-tab');
  }
}

async function loadContacts() {
  const res = await fetch('/api/contacts');
  const data = await res.json();

  const container = document.getElementById('contactsList');
  container.innerHTML = '';

  data.forEach(c => {
    const div = document.createElement('div');
    div.className = "border p-2 mb-2";

    div.innerHTML = `
      <b>${c.name || '(No Name)'}</b><br>
      ${c.email}<br>
      ${c.phone || ''}<br><br>

      <button onclick="editContact('${c.id}')">Edit</button>
    `;

    container.appendChild(div);
  });
}

async function addContact() {
  await fetch('/api/contacts', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value
    })
  });

  document.getElementById('name').value = '';
  document.getElementById('email').value = '';
  document.getElementById('phone').value = '';

  loadContacts();
}

async function editContact(id) {
  const newName = prompt("New name:");
  const newEmail = prompt("New email:");
  const newPhone = prompt("New phone:");

  await fetch('/api/contacts/' + id, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      name: newName,
      email: newEmail,
      phone: newPhone
    })
  });

  loadContacts();
}

setActiveTab();
loadContacts();
</script>

</body>
</html>
